<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <title>Carteirinha do Aluno</title>
    <link rel="stylesheet" href="carteirinha.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="card-page">
    <header class="topbar">
      <div class="topbar-left">
        <img
          src="assets/Logo_Azul_e_Laranja_de_Faculdade_1_-removebg-preview.png"
          class="logo-menu"
        />
        <span class="portal-title">Portal do Aluno</span>
      </div>

      <div class="topbar-right">
        <span id="nomeMenu"></span>
        <button onclick="logout()" class="logout-btn">Sair</button>
      </div>
    </header>
    <div class="student-card">
      <div class="card-header">
        <img
          src="assets/Logo_Azul_e_Laranja_de_Faculdade_1_-removebg-preview.png"
          class="logo-card"
        />
        <h2>Carteira Estudantil</h2>
      </div>

      <div class="card-body">
        <img id="fotoAluno" class="student-photo" />

        <h3 id="nomeAluno"></h3>

        <p><strong>RA:</strong> <span id="raAluno"></span></p>

        <p><strong>Curso:</strong> <span id="cursoAluno"></span></p>

        <p><strong>Status:</strong> <span id="statusAluno"></span></p>

        <p><strong>Matrícula:</strong> <span id="matriculaAluno"></span></p>
      </div>
    </div>

    <script src="carteirinha.js"></script>
  </body>
</html>
