<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carteirinha do Aluno</title>
  <link rel="stylesheet" href="../styles/carteirinha.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet"
  />
</head>

  <body class="card-page">
    <header class="topbar">
      <div class="topbar-left">
        <img
          src="/assets/logoFaculdadeSocrates.png"
          class="logo-menu"
        />
        <span class="portal-title">Portal do Aluno</span>
      </div>

      <div class="topbar-right">
        <span id="nomeMenu"></span>
        <button id="btn-logout" onclick="logout()" class="logout-btn">Sair</button>
      </div>
    </header>
    <div class="student-card">
      <div class="card-header">
        <img
          src="../assets/logoFaculdadeSocrates.png"
          class="logo-card"
        />
      </div>
      <div class="card-body">
        <img id="fotoAluno" class="student-photo" />
        <h3 id="nomeAluno"></h3>
        <div class="dadosAluno">
          <div class="linha-matricula">
            <p><strong>Matrícula:</strong> <span id="raAluno"></span></p>
            <span id="statusAluno" class="badge-status"></span>
          </div>

          <p><strong>Curso:</strong> <span id="cursoAluno"></span></p>
        </div>
    </div>
    <p class="qr-label">Validação do aluno</p>
    <div id="qrCode">
    </div>
    <div class="card-footer">Documento estudantil</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <script src="../js/carteirinha.js"></script>
  </body>
</html>
